apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-de-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile-de-scraper
  template:
    metadata:
      labels:
        app: mobile-de-scraper
    spec:
      initContainers:
        - name: mobile-de-crawler-wait
          image: busybox:1.35.0-uclibc
          command:
            - /bin/sh
            - -c
            - |
              until nc -z mobile-de-crawler.mobile-de-data-collector.svc.cluster.local 8080; do
                  echo waiting for mobile-de-crawler; sleep 2;
              done
      containers:
        - name: mobile-de-scraper
          image: localhost:5000/com.robertciotoiu/mobile-de-scraper:latest
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq-service
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: guest
            - name: SPRING_RABBITMQ_PASSWORD
              value: guest

            - name: SPRING_DATA_MONGODB_HOST
              value: mongodb-service
            - name: SPRING_DATA_MONGODB_PORT
              value: "27017"
            - name: SPRING_DATA_MONGODB_USERNAME
              value: admin
            - name: SPRING_DATA_MONGODB_PASSWORD
              value: admin
            - name: SPRING_DATA_MONGODB_DATABASE
              value: mobile-de-car-data
            - name: management.endpoint.health.probes.enabled
              value: "true"
            - name: management.health.livenessState.enabled
              value: "true"
            - name: management.health.readinessState.enabled
              value: "true"